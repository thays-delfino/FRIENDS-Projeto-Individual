<script>

  function cadastrar() {
    //pega os valores digitados nos inputs
    var nomeVar = nome_input.value; 
    var emailVar = email_input.value; 
    var senhaVar = senha_input.value; 
    var confirmacaoSenhaVar = confirmacao_senha_input.value; 

    cardErro.style.display = "none"; //esconde o card de erro antes de validar

     // verifica se os campo nome estão vazios
     if (
      nomeVar == "" ||
      emailVar == "" || 
      senhaVar == "" || 
      confirmacaoSenhaVar == "" 
    ) {
      cardErro.style.display = "block"; // se estiver vazio exibe o card e mensagem de erro
      mensagem_erro.innerHTML =
        "(Erro! preencha todos os campos em branco)";

      finalizarAguardar(); // para o loading
      return false; // interrompe a função, não continua
    } else {
      setInterval(sumirMensagem, 5000); // após 5 segundos, chama a função que esconde a mensagem
    }

    if (nomeVar.length < 3) { // verifica se o nome tem ao menos 3 caracteres
      cardErro.style.display = "block"; 
      mensagem_erro.innerHTML = "Nome deve ter no mínimo 3 caracteres."; 
      return false; 
    }

    if (emailVar.indexOf("@") == -1 || emailVar.indexOf(".") == -1) { // indexOf retorna -1 quando não encontra o caractere
      cardErro.style.display = "block"; 
      mensagem_erro.innerHTML = "Digite um e-mail válido."; 
      return false;
    }

    if (senhaVar.length < 8) { // a senha precisa ter ao menos 8 caracteres
      cardErro.style.display = "block"; 
      mensagem_erro.innerHTML = "A senha precisa ter no mínimo 8 caracteres."; 
      return false; 
    }

    var especiais = "!\"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~"; // variável com todos os caracteres especiais
    var temEspecial = false; // temEspecial começa com false, altera se houver algum caractere especial

    for (var i = 0; i < especiais.length; i++) { // percorre cada caractere especial
      if (senhaVar.indexOf(especiais[i]) != -1) { // verifica se a senha contém o caractere especial atual
        temEspecial = true; // se encontrou, muda para true
        break; 
      }
    }
    if (!temEspecial) { // se não houver especial
      cardErro.style.display = "block"; // exibe o card de erro
      mensagem_erro.innerHTML = "A senha precisa conter um caractere especial."; // exibe a mensagem de erro
      return false; // interrompe a função
    }

    fetch("/usuarios/cadastrar", { // faz requisição POST para a rota /usuario/cadastrar
      method: "POST", // define o método como POST ppois está enviando dados
      headers: { "Content-Type": "application/json" }, 
      body: JSON.stringify({ // converte os dados para JSON antes de enviar
        //envia o nome, email e senha digitado
        nomeServer: nomeVar, 
        emailServer: emailVar, 
        senhaServer: senhaVar 
      })
    })
      .then(function (resposta) { // quando o servidor responder entra aqui
        if (resposta.ok) { // se o cadastro foi realizado com sucesso
          cardErro.style.display = "block"; // exibe card de  mensgem de sucesso
          mensagem_erro.innerHTML = "Cadastro realizado com sucesso! Redirecionando..."; // exibe mensagem de sucesso
          setTimeout(function () { // aguarda 2 segundos antes de redirecionar
            window.location = "login.html"; // redireciona para a página de login após 2 segundos
          }, 2000);
        } else {
          resposta.text().then(function (texto) { 
            cardErro.style.display = "block"; // exibe o card de erro
            mensagem_erro.innerHTML = texto; // exibe a mensagem de erro retornada pelo servidor (ex: email já cadastrado)
          });
        }
      })
      .catch(function (erro) { // se houver erro na conexão com o servidor
        console.log("#ERRO: " + erro); // exibe o erro no console
        finalizarAguardar(); // para o loading
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none"; // esconde o card de erro
  }
</script>
