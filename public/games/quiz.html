<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="icon" href="../assets/imgs/quadro.png">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIENDS | Quiz</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body onload="validarSessao()">

    <div class="janela">

        <div class="header-left dash-header">

            <img src="../assets/imgs/quadro.png" alt="" class="quadro-img">
            <h1 class="titulo">
                F<span class="ponto1"> •</span>
                R<span class="ponto2"> •</span>
                I<span class="ponto3"> •</span>
                E<span class="ponto4"> •</span>
                N<span class="ponto5"> •</span>
                D<span class="ponto6"> •</span>
                S
            </h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">
                <h3>Quiz</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./testePersonalidade.html">
                    <h3>Teste Personalidade</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="app">
            <div class="quiz-container">
                <h2 class="titulo-quiz">
                    Q<span class="ponto1">•</span>u<span class="ponto2">•</span>i<span class="ponto3">•</span>z&nbsp;
                    d<span class="ponto4">•</span>e&nbsp;
                    F<span class="ponto5">•</span>r<span class="ponto6">•</span>i<span class="ponto1">•</span>e<span
                        class="ponto2">•</span>n<span class="ponto3">•</span>d<span class="ponto4">•</span>s
                </h2>
                <div class="quiz">
                    <h2 id="question"></h2>
                    <div id="answer-buttons"></div>
                </div>
                <h2 class=mensagemInicialQuiz id="mensagem">Olá friend! <br>Será que você é fã de verdade? Vamos
                    descobrir!</h2>
                <img id="gifInicio" src="../assets/gifTeste.gif" alt="friends gif">
                <button onclick="iniciarQuiz()" id="btnIniciar">Iniciar Quiz</button>
                <button onclick="proximaPergunta()" id="btnProxima">Próxima</button>
            </div>
        </div>
    </div>

    <script>

        var perguntas = [
            {
                pergunta: "Quem disse: 'We were on a break!'?",
                respostas: ["Ross", "Chandler", "Joey", "Monica"],
                correta: 0,
                imagem: ""

            },
            {
                pergunta: "Qual o nome do café?",
                respostas: ["Central Perk", "Coffee NY", "Friends Café", "Perk House"],
                correta: 0,
                imagem: "../assets/imgs/cafe.png"
            },
            {
                pergunta: "Quem é chef de cozinha?",
                respostas: ["Rachel", "Phoebe", "Monica", "Janice"],
                correta: 2,
                imagem: ""
            },
            {
                pergunta: "Por que Marcel, o macaco do Ross, sai do zoológico?",
                respostas: ["É roubado para trabalhar como ator", "Foge para encontrar Ross", "Briga com os outros macacos", "Aparece em um clipe de 'The Lion Sleeps Tonight'"],
                correta: 3,
                imagem: "../assets/imgs/rosseMacaco.png"
            },
            {
                pergunta: "Complete a letra da música:<br><br> 'Smelly Cat' da Phoebe: 'Smelly cat, smelly cat, what are they feeding you? Smelly cat, smelly cat…'",
                respostas: ["You don't deserve the zoo", "You smell of poo", "It's not your fault", "Come and have a bath"],
                correta: 2,
                imagem: "../assets/imgs/SmellyCat.png"
            },
            {
                pergunta: "Quantas páginas tinha a carta que Rachel escreveu para Ross?",
                respostas: ["10", "12", "15", "18"],
                correta: 3,
                imagem: "../assets/imgs/cartaRachel.png"
            },
            {
                pergunta: "Por quem o Gunther do Central Perk é apaixonado?",
                respostas: ["Rachel", "Chandler", "Phoebe", "Monica"],
                correta: 0,
                imagem: "../assets/imgs/gunther.png"
            },
            {
                pergunta: "Joey mente sobre algo importante no seu currículo de ator. O que é?",
                respostas: ["Que faz sotaque italiano", "Que fala francês", "Que bebe um litro de leite em 10 segundos", "Que sabe esquiar"],
                correta: 1,
                imagem: "../assets/imgs/joeyCurriculo.png"
            },
            {
                pergunta: "Qual é o nome do segundo filho do Ross?",
                respostas: ["Emily", "Emma", "Ella", "Ben"],
                correta: 1,
                imagem: "../assets/imgs/filhaRachel.png"
            },
            {
                pergunta: "Phoebe tem medo de ir ao dentista por qual motivo?",
                respostas: ["Tem medo do dentista", "Acha que o dentista é seu pai que nunca conheceu", "Acha que alguém morre toda vez que ela vai ao dentista", "Acha que seus amigos vão embora quando ela vai ao dentista"],
                correta: 2,
                imagem: "../assets/imgs/phoebeDentista.png"
            },
            {
                pergunta: "Em qual programa Monica e Ross fazem 'the routine'?",
                respostas: ["Robert Clark's Rockin New Year's Eve", "Dick Clark's New Year's Rockin' Eve", "New Year's Rockin' Eve with Dick Clark", "Rockin' Around the New Year's Eve"],
                correta: 1,
                imagem: "../assets/imgs/theRoutine.png"
            },
            {
                pergunta: "Ross traiu Rachel durante o 'break'?",
                respostas: ["Sim, ficou com a Chloe", "Não, eles estavam separados", "Sim, ficou com a Emily", "Não, foi tudo mentira"],
                correta: 0,
                imagem: "../assets/imgs/weWereOnABreak.png"
            },
        ];

        var perguntaAtual = 0; 
        var pontuacao = 0;      
        var telaInicio = true;  

        function iniciarQuiz() { // função chamada quando o usuário clica em "Iniciar Quiz"
            perguntaAtual = 0;   
            pontuacao = 0;       
            jaRespondeu = false; 

            document.getElementById("btnIniciar").style.display = "none";  // esconde o botão de iniciar
            document.getElementById("mensagem").style.display = "none";    // esconde a mensagem inicial
            document.getElementById("btnProxima").style.display = "none";  // esconde o botão de próxima
            document.getElementById("gifInicio").style.display = "none";   // esconde o gif inicial

            mostrarPergunta(); // chama a função que exibe a primeira pergunta
        }

        function mostrarPergunta() { // função que exibe a pergunta atual na tela
            jaRespondeu = false; // reseta o controle de resposta para a nova pergunta

            var divBotoes = document.getElementById("answer-buttons"); // pega a div que contém os botões de resposta
            divBotoes.innerHTML = ""; // limpa os botões da pergunta anterior

            if (perguntas[perguntaAtual].imagem == "") { // verifica se a pergunta não tem imagem
                document.getElementById("question").innerHTML = perguntas[perguntaAtual].pergunta; // exibe apenas o texto da pergunta
            } else {
                document.getElementById("question").innerHTML = perguntas[perguntaAtual].pergunta +
                    "<br><img src='" + perguntas[perguntaAtual].imagem + "' style='width: 200px; border-radius: 10px;'>";
                // exibe o texto da pergunta junto com a imagem
            }

            var i = 0;

            while (i < perguntas[perguntaAtual].respostas.length) { // percorre todas as respostas da pergunta atual

                var btn = document.createElement("button"); // cria um novo botão para cada resposta

                btn.innerText = perguntas[perguntaAtual].respostas[i]; // define o texto do botão com a resposta

                btn.className = "btn-quiz"; // aplica a classe CSS do botão de quiz

                btn.setAttribute("data-indice", i); // salva o índice da resposta no botão para identificar qual foi clicado

                btn.onclick = verificarResposta; // define a função que será chamada quando o botão for clicado

                divBotoes.appendChild(btn); // adiciona o botão na div de respostas

                i++; // avança para a próxima resposta
            }

            document.getElementById("btnProxima").style.display = "none"; // esconde o botão próxima até o usuário responder
        }

        function verificarResposta() {
            var indiceClicado = parseInt(this.getAttribute("data-indice")); // pega o índice do botão clicado
            var indiceCerto = perguntas[perguntaAtual].correta; // pega o índice da resposta correta da pergunta atual

            if (indiceClicado == indiceCerto) { // verifica se o botão clicado é o correto
                pontuacao++; // soma 1 ponto na pontuação se acertou
            }

            this.classList.add("selecionado"); // deixa o botão clicado com a cor escura independente de acertar ou errar

            var botoes = document.getElementById("answer-buttons").children; // pega todos os botões de resposta

            // após o usuário clicar em qualquer botão, todos ficam bloqueados e ele não consegue mais clicar em nenhum.
            var i = 0;
            while (i < botoes.length) { // percorre todos os botões
                botoes[i].disabled = true; // desabilita o botão para não deixar clicar novamente
                i++; // avança para o próximo botão
            }

            document.getElementById("btnProxima").style.display = "block"; // exibe o botão próxima após responder
        }

        function proximaPergunta() { // função chamada quando o usuário clica em "Próxima"
            perguntaAtual++; // avança para a próxima pergunta

            if (perguntaAtual < perguntas.length) { // se ainda há perguntas
                mostrarPergunta(); // exibe a próxima pergunta
            } else {
                mostrarResultado(); // se acabaram as perguntas, exibe o resultado final
            }
        }

        function mostrarResultado() { // função que exibe o resultado final do quiz

            document.getElementById("answer-buttons").innerHTML = ""; // limpa os botões de resposta
            document.getElementById("btnProxima").style.display = "none"; // esconde o botão próxima

            if (pontuacao <= 3) { // se acertou 3 ou menos
                gif = "../assets/joeyTriste.gif"; // exibe gif do Joey triste
                mensagem = "Parece que você não é bem um fã... Tente de novo!"; // mensagem de desempenho ruim
            } else if (pontuacao <= 8) { // se acertou entre 4 e 8
                gif = "../assets/joeyOk.gif"; // exibe gif do Joey ok
                mensagem = "Nada mal, mas dá para melhorar!"; // mensagem de desempenho médio
            } else { // se acertou 9 ou mais
                gif = "../assets/rachelPhoebeFeliz.gif"; // exibe gif da Rachel e Phoebe felizes
                mensagem = "Uau! Você é um verdadeiro friend!"; // mensagem de desempenho ótimo
            }

            document.getElementById("question").innerHTML =
                "Você acertou " + pontuacao + " de " + perguntas.length + "!" + // exibe a pontuação final
                "<br><img src='" + gif + "' style='width: 200px; border-radius: 10px;'>" + // exibe o gif do resultado
                "<br><p>" + mensagem + "</p>"; // exibe a mensagem do resultado

            var idUsuario = sessionStorage.ID_USUARIO; // pega o id do usuário salvo na sessão quando fez login
            console.log("idUsuario:", idUsuario); // exibe o id no console para debug
            console.log("pontuacao:", pontuacao); // exibe a pontuação no console para debug

            // faz uma requisição POST para enviar os resultados para uma rota da API
            fetch("/quiz/salvar", { 
                method: "POST", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ // converte os dados para JSON antes de enviar
                    idUsuario: idUsuario, // envia o id do usuário
                    pontuacao: pontuacao, // envia a pontuação final
                    total: perguntas.length // envia o total de perguntas
                })
            })
                .then(function (res) {
                    return res.json(); // converte a resposta do servidor para JSON
                })
                .then(function (dados) {
                    console.log("Resultado salvo!", dados); // exibe no console que o resultado foi salvo com sucesso
                })
                .catch(function (erro) {
                    console.log("Erro ao salvar:", erro); // exibe no console se houve erro ao salvar
                });
        }

    </script>

</body>

</html>
