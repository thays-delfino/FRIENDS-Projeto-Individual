<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="icon" href="/assets/quadro.png">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIENDS | Quiz</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body onload="telaInicial(); validarSessao()">

    <div class="janela">

        <div class="header-left dash-header">

            <img src="../assets/imgs/quadro.png" alt="" class="quadro-img">
            <h1 class="titulo">
                F<span class="ponto1"> •</span>
                R<span class="ponto2"> •</span>
                I<span class="ponto3"> •</span>
                E<span class="ponto4"> •</span>
                N<span class="ponto5"> •</span>
                D<span class="ponto6"> •</span>
                S
            </h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./quiz.html">
                    <h3>Quiz</h3>
                </a>
            </div>

            <div class="btn-nav">
                <h3>Teste Personalidade</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="app">
            <div class="quiz-container">
                <h2 class="titulo-quiz">
                    T<span class="ponto1">•</span>E<span class="ponto2">•</span>S<span class="ponto3">•</span>T<span
                        class="ponto4">•</span>E&nbsp;
                    D<span class="ponto5">•</span>E&nbsp;
                    P<span class="ponto6">•</span>E<span class="ponto1">•</span>R<span class="ponto2">•</span>S<span
                        class="ponto3">•</span>O<span class="ponto4">•</span>N<span class="ponto5">•</span>A<span
                        class="ponto6">•</span>L<span class="ponto1">•</span>I<span class="ponto2">•</span>D<span
                        class="ponto3">•</span>A<span class="ponto4">•</span>D<span class="ponto5">•</span>E</h2>
                <div class="quiz">
                    <h2 id="question"></h2>
                    <div id="answer-buttons"></div>
                </div>
                <h2 class=mensagemInicialQuiz id="mensagem"><br>Qual personagem de Friends você é? Descubra agora!</h2>
                <img id="gifInicio" src="../assets/gifQuiz.gif" alt="friends gif">
                <button onclick="iniciarTeste()" id="btnIniciar">Iniciar Quiz</button>
                <button onclick="proximaPergunta()" id="btnProxima">Próxima</button>

            </div>
        </div>
    </div>

    <script>
        var identificacao = "";

        const personagens = [
            { nome: "Ross" },
            { nome: "Rachel" },
            { nome: "Monica" },
            { nome: "Chandler" },
            { nome: "Joey" },
            { nome: "Phoebe" }
        ]

        // cada resposta tem um "personagem" — a letra indica quem é
        // a = Monica, b = Chandler, c = Ross, d = Rachel, e = Joey, f = Phoebe
        var perguntas = [
            {
                pergunta: "Antes de começar, com qual personagem você mais se identifica?",
                respostas: [
                    { texto: "Ross", personagem: "intro" },
                    { texto: "Rachel", personagem: "intro" },
                    { texto: "Monica", personagem: "intro" },
                    { texto: "Chandler", personagem: "intro" },
                    { texto: "Joey", personagem: "intro" },
                    { texto: "Phoebe", personagem: "intro" }
                ],
                intro: true
            },
            {
                pergunta: "Como você age em uma festa?",
                respostas: [
                    { texto: "a) Organizo tudo e me certifico que está perfeito", personagem: "Monica" },
                    { texto: "b) Fico fazendo piadas para animar o pessoal", personagem: "Chandler" },
                    { texto: "c) Fico falando sobre meu assunto favorito", personagem: "Ross" },
                    { texto: "d) Cuido do visual e chego arrasando", personagem: "Rachel" },
                    { texto: "e) Como tudo que tem na mesa", personagem: "Joey" },
                    { texto: "f) Toco violão e canto músicas que escrevi", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "Qual é o seu maior defeito?",
                respostas: [
                    { texto: "a) Sou muito perfeccionista e competitiva", personagem: "Monica" },
                    { texto: "b) Uso o humor para evitar conversas sérias", personagem: "Chandler" },
                    { texto: "c) Falo demais sobre coisas que ninguém liga", personagem: "Ross" },
                    { texto: "d) Penso muito em mim mesma às vezes", personagem: "Rachel" },
                    { texto: "e) Sou um pouco ingênuo e distraído", personagem: "Joey" },
                    { texto: "f) Vivo no meu mundo e às vezes confundo as pessoas", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "O que você faz no fim de semana?",
                respostas: [
                    { texto: "a) Cozinho pratos elaborados para os amigos", personagem: "Monica" },
                    { texto: "b) Assisto séries e faço piadas sobre elas", personagem: "Chandler" },
                    { texto: "c) Vou a museus ou leio livros de ciência", personagem: "Ross" },
                    { texto: "d) Vou às compras ou a um spa", personagem: "Rachel" },
                    { texto: "e) Como um bom sanduíche e assisto futebol", personagem: "Joey" },
                    { texto: "f) Toco música ou faço meditação", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "Como você reage quando perde uma discussão?",
                respostas: [
                    { texto: "a) Não aceito, preciso ganhar sempre", personagem: "Monica" },
                    { texto: "b) Faço uma piada para disfarçar", personagem: "Chandler" },
                    { texto: "c) Busco um livro para provar que estou certo", personagem: "Ross" },
                    { texto: "d) Fico na minha e finjo que não ligo", personagem: "Rachel" },
                    { texto: "e) Já nem lembro do que era a discussão", personagem: "Joey" },
                    { texto: "f) Mando energias positivas para todo mundo", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "Como você demonstra amor pelos amigos?",
                respostas: [
                    { texto: "a) Cozinho para eles e cuido da casa", personagem: "Monica" },
                    { texto: "b) Faço piadas para animá-los quando estão tristes", personagem: "Chandler" },
                    { texto: "c) Dou conselhos baseados em fatos e ciência", personagem: "Ross" },
                    { texto: "d) Ajudo a escolher roupas e cuido da aparência deles", personagem: "Rachel" },
                    { texto: "e) Compartilho minha comida — e é muito amor", personagem: "Joey" },
                    { texto: "f) Canto músicas especiais para cada um", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "Qual seria seu emprego ideal?",
                respostas: [
                    { texto: "a) Chef de cozinha em um restaurante famoso", personagem: "Monica" },
                    { texto: "b) Analista financeiro ou algo parecido", personagem: "Chandler" },
                    { texto: "c) Paleontólogo ou professor universitário", personagem: "Ross" },
                    { texto: "d) Executiva de moda ou estilista", personagem: "Rachel" },
                    { texto: "e) Ator ou qualquer coisa que apareça na TV", personagem: "Joey" },
                    { texto: "f) Massagista ou músico independente", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "O que você faz quando está estressado?",
                respostas: [
                    { texto: "a) Limpo a casa compulsivamente", personagem: "Monica" },
                    { texto: "b) Faço piadas sem parar", personagem: "Chandler" },
                    { texto: "c) Começo a falar sobre dinossauros", personagem: "Ross" },
                    { texto: "d) Vou às compras para me sentir melhor", personagem: "Rachel" },
                    { texto: "e) Como alguma coisa gostosa", personagem: "Joey" },
                    { texto: "f) Medito ou escrevo uma música nova", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "Se algo dá errado no último minuto, como você reage?",
                respostas: [
                    { texto: "a) Tento resolver rapidamente e deixar tudo perfeito", personagem: "Monica" },
                    { texto: "b) Faço piada da situação pra aliviar o clima", personagem: "Chandler" },
                    { texto: "c) Analiso o que deu errado e explico tudo", personagem: "Ross" },
                    { texto: "d) Fico frustrado(a), mas tento manter a postura", personagem: "Rachel" },
                    { texto: "e) Dou risada e sigo em frente", personagem: "Joey" },
                    { texto: "f) Acredito que tudo acontece por um motivo", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "Como você age em um relacionamento?",
                respostas: [
                    { texto: "a) Sou dedicada e quero que tudo seja perfeito", personagem: "Monica" },
                    { texto: "b) Tenho medo de me comprometer, mas no fundo amo", personagem: "Chandler" },
                    { texto: "c) Me apaixono intensamente e fico obcecado", personagem: "Ross" },
                    { texto: "d) Demorei para crescer, mas me tornei independente", personagem: "Rachel" },
                    { texto: "e) Sou leal e protetor dos que amo", personagem: "Joey" },
                    { texto: "f) Acredito em almas gêmeas e energias do universo", personagem: "Phoebe" }
                ]
            },
            {
                pergunta: "Qual é a sua maior qualidade?",
                respostas: [
                    { texto: "a) Sou extremamente dedicada e organizada", personagem: "Monica" },
                    { texto: "b) Consigo fazer qualquer um sorrir", personagem: "Chandler" },
                    { texto: "c) Sou inteligente e muito bem informado", personagem: "Ross" },
                    { texto: "d) Evoluí muito e sei o que quero da vida", personagem: "Rachel" },
                    { texto: "e) Sou leal e nunca abandono um amigo", personagem: "Joey" },
                    { texto: "f) Sou autêntica e não ligo para o julgamento alheio", personagem: "Phoebe" }
                ]
            }
        ];

        // contadores de votos para cada personagem

        var votos = { // objeto que conta quantos votos cada personagem recebeu
            Monica: 0,   // começa com zero votos
            Chandler: 0,
            Ross: 0,
            Rachel: 0,
            Joey: 0,
            Phoebe: 0
        };

        var perguntaAtual = 0;   // controla qual pergunta está sendo exibida, começa na primeira (índice 0)
        var jaRespondeu = false; // controla se o usuário já respondeu a pergunta atual, evita clicar duas vezes
        var respostaAtual = ""; // guarda a última resposta selecionada

        function telaInicial() { // função chamada quando a página carrega, exibe a tela inicial
            document.getElementById("btnIniciar").style.display = "block"; // exibe o botão iniciar
            document.getElementById("gifInicio").style.display = "block";  // exibe o gif inicial
        }

        function iniciarTeste() { // função chamada quando o usuário clica em "Iniciar Quiz"
            perguntaAtual = 0;   // reseta para a primeira pergunta
            jaRespondeu = false; // reseta o controle de resposta

            // zera todos os votos para começar o teste do zero
            votos.Monica = 0;
            votos.Chandler = 0;
            votos.Ross = 0;
            votos.Rachel = 0;
            votos.Joey = 0;
            votos.Phoebe = 0;

            document.getElementById("mensagem").style.display = "none";  // esconde a mensagem inicial
            document.getElementById("btnIniciar").style.display = "none"; // esconde o botão iniciar
            document.getElementById("gifInicio").style.display = "none";  // esconde o gif inicial

            mostrarPergunta(); // chama a função que exibe a primeira pergunta
        }

        function mostrarPergunta() { // função que exibe a pergunta atual na tela
            jaRespondeu = false; // reseta o controle de resposta para a nova pergunta

            var divBotoes = document.getElementById("answer-buttons"); // pega a div que contém os botões de resposta
            divBotoes.innerHTML = ""; // limpa os botões da pergunta anterior

            document.getElementById("question").innerText = perguntas[perguntaAtual].pergunta; // exibe o texto da pergunta atual

            for (var i = 0; i < perguntas[perguntaAtual].respostas.length; i++) { // percorre todas as respostas da pergunta atual

                var btn = document.createElement("button"); // cria um novo botão para cada resposta

                btn.innerText = perguntas[perguntaAtual].respostas[i].texto; // define o texto do botão com a resposta

                btn.className = "btn-quiz"; // aplica a classe CSS do botão de quiz

                btn.setAttribute("data-personagem", perguntas[perguntaAtual].respostas[i].personagem); // salva o personagem no botão para identificar qual foi clicado

                btn.onclick = selecionarResposta; // define a função que será chamada quando o botão for clicado

                divBotoes.appendChild(btn); // adiciona o botão na div de respostas
            }

            document.getElementById("btnProxima").style.display = "none"; // esconde o botão próxima até o usuário responder
        }

        function selecionarResposta() {
            var personagemEscolhido = this.getAttribute("data-personagem"); // pega o personagem do botão clicado

            // remove o destaque de todos os botões
            var botoes = document.getElementById("answer-buttons").children;

            for (var i = 0; i < botoes.length; i++) {
                botoes[i].classList.remove("selecionado");
            }

            this.classList.add("selecionado"); // destaca apenas o botão clicado

            if (personagemEscolhido == "intro") { // se é a pergunta introdutória
                identificacao = this.innerText; // salva o personagem de identificação
            } else {
                respostaAtual = personagemEscolhido; // salva a última resposta selecionada
            }

            document.getElementById("btnProxima").style.display = "block";
        }

        function proximaPergunta() {

            if (respostaAtual != "") { // se há uma resposta selecionada
                votos[respostaAtual]++; // conta o voto só quando clicar em próxima
                respostaAtual = ""; // reseta a resposta atual
            }

            perguntaAtual++;

            if (perguntaAtual < perguntas.length) {
                mostrarPergunta();
            } else {
                mostrarResultado();
            }
        }

        function mostrarResultado() { // função que exibe o resultado final do teste

            document.getElementById("answer-buttons").innerHTML = ""; // limpa os botões de resposta
            document.getElementById("btnProxima").style.display = "none"; // esconde o botão próxima

            var personagens = [ // array com os dados de cada personagem para exibir no resultado
                { nome: "Monica", imagem: "../assets/gifMonica.gif", descricao: "Você é perfeccionista, competitiva e ama cuidar de todos!" },
                { nome: "Chandler", imagem: "../assets/gifChandler.gif", descricao: "Você usa o humor para tudo, mas tem um coração enorme!" },
                { nome: "Ross", imagem: "../assets/gifRoss.gif", descricao: "Você é inteligente, apaixonado e um pouco dramático!" },
                { nome: "Rachel", imagem: "../assets/gifRachel.gif", descricao: "Você evoluiu muito e sabe exatamente o que quer da vida!" },
                { nome: "Joey", imagem: "../assets/gifJoey.gif", descricao: "Você é leal, engraçado e ama uma boa comida!" },
                { nome: "Phoebe", imagem: "../assets/gifPhoebe.gif", descricao: "Você é autêntica, criativa e vive no seu próprio mundo!" }
            ];

            var contagem = [votos.Monica, votos.Chandler, votos.Ross, votos.Rachel, votos.Joey, votos.Phoebe];
            // cria um array com a contagem de votos de cada personagem na mesma ordem do array personagens

            var maiorVoto = 0; // variável para guardar o maior número de votos

            for (var i = 0; i < contagem.length; i++) { // percorre a contagem de votos
                if (contagem[i] > maiorVoto) { // verifica se o voto atual é maior que o maior encontrado
                    maiorVoto = contagem[i]; // atualiza o maior voto
                }
            }

            var empatados = []; // array para guardar os índices dos personagens empatados

            for (var i = 0; i < contagem.length; i++) { // percorre a contagem de votos novamente
                if (contagem[i] == maiorVoto) { // verifica se o personagem tem o maior número de votos
                    empatados.push(i); // adiciona o índice do personagem empatado no array
                }
            }

            var indiceMaior = empatados[Math.floor(Math.random() * empatados.length)];
            // se houver empate, sorteia aleatoriamente um dos personagens empatados

            var vencedor = personagens[indiceMaior]; // pega os dados do personagem vencedor da posição do indice maior

            document.getElementById("question").innerHTML =
                "Você é " + vencedor.nome + "!" + // exibe o nome do personagem vencedor
                "<br><br><img src='" + vencedor.imagem + "' style='width: 800px; border-radius: 10px;'>" + // exibe o gif do personagem
                "<br><p style='font-size: 25px;''>" + vencedor.descricao + "</p>"; // exibe a descrição do personagem

            var idUsuario = sessionStorage.ID_USUARIO; // pega o id do usuário salvo na sessão quando fez login

            fetch("/personalidade/salvar", { // faz uma requisição POST para salvar o resultado no banco
                method: "POST", // define o método como POST pois está enviando dados
                headers: { "Content-Type": "application/json" }, // informa que os dados são em formato JSON
                body: JSON.stringify({ // converte os dados para JSON antes de enviar
                    idUsuario: idUsuario,       // envia o id do usuário
                    personagem: vencedor.nome,  // envia o personagem vencedor
                    identificacao: identificacao // envia o personagem com quem o usuário se identificou no início
                })
            });
        }

    </script>

</body>

</html>
